version: '3.8'

services:
  suruhngoding:
    build: .
    container_name: suruhngoding-prod
    ports:
      - "80:80"
    restart: always
    environment:
      TZ: Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
